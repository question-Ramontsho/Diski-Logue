name: Update season data and deploy site

on:
  schedule:
    - cron: '0 4 * * *'   # daily at 04:00 UTC
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - 'diski-logue-repo/docs/**'
      - 'diski-logue-repo/diski_logue/**'

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r diski-logue-repo/requirements.txt

      - name: Sync all competitions
        working-directory: diski-logue-repo
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: python -m diski_logue.scripts.sync_all

      - name: Commit updated data
        run: |
          git config user.name "diski-logue-bot"
          git config user.email "actions@github.com"

          git pull --rebase origin main

          git add diski-logue-repo/docs/data/

          git diff --staged --quiet || git commit -m "Auto-update season data [skip ci]"

          git push

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: diski-logue-repo/docs

  deploy:
    needs: update-data
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
